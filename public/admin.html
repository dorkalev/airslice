<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIRSLICE — moderation</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
  :root { --hot:#ff2e88; --cyan:#29f4ff; --lime:#b6ff2e; --bg:#0a0a12; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:#fff; font-family:'Fragment Mono',monospace; min-height:100vh; }
  .wrap { max-width:1100px; margin:0 auto; padding:30px 20px 60px; }
  .title { font-family:'Bangers',cursive; font-size:clamp(40px,7vw,72px); text-shadow:3px 3px 0 var(--hot),6px 6px 0 #7a0b3d; transform:rotate(-2deg); }
  .sub { color:#9aa; font-size:12px; margin:10px 0 22px; }
  .btn { font-family:'Bangers',cursive; font-size:22px; letter-spacing:.04em; color:#0a0a12; background:var(--lime); border:none; border-radius:12px; padding:12px 28px; cursor:pointer; box-shadow:0 4px 0 #5c8a0e; }
  .btn:hover { transform:scale(1.03); }
  .who { font-size:12px; color:#9aa; margin:14px 0; }
  .who b { color:var(--cyan); font-weight:400; }
  .who a { color:var(--hot); cursor:pointer; }
  #gate.err { color:var(--hot); }
  .board { display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:14px; margin-top:20px; }
  .run { background:#12121e; border:1px solid #ffffff14; border-radius:14px; overflow:hidden; position:relative; }
  .run video { width:100%; aspect-ratio:4/3; object-fit:cover; display:block; background:#000; }
  .run .meta { padding:9px 12px 11px; display:flex; align-items:baseline; gap:9px; }
  .pts { font-family:'Bangers',cursive; font-size:26px; color:var(--cyan); text-shadow:2px 2px 0 #0b4a7a; }
  .pts small { font-size:12px; color:#9aa; text-shadow:none; }
  .stats { margin-left:auto; text-align:right; font-size:9px; color:#778; line-height:1.6; }
  .modrow { position:absolute; top:8px; right:8px; z-index:3; display:flex; gap:6px; }
  .mod { font-family:'Fragment Mono',monospace; font-size:11px; border-radius:8px; padding:6px 10px; cursor:pointer; background:#000000cc; }
  .mod:disabled { opacity:.5; cursor:default; }
  .archive { color:#ffd24f; border:1px solid #ffd24f55; }
  .archive:hover { background:#8a6b0e; color:#fff; }
  .kill { color:#ff8aa8; border:1px solid #ff2e8855; }
  .kill:hover { background:#7a0b3d; color:#fff; }
  #more { color:#778; font-size:12px; padding:18px 0; min-height:20px; }
  #sentinel { height:30px; }
  .hover-hint { position:absolute; bottom:6px; left:50%; transform:translateX(-50%); font-size:9px; color:#9aa; background:#000000aa; padding:2px 7px; border-radius:6px; pointer-events:none; }
  a.back { color:var(--cyan); font-size:12px; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="title">MODERATION 🛡️</div>
  <div class="sub">delete bad clips from the wall · <a class="back" href="./">← back to the game</a></div>
  <div id="gate">
    <button class="btn" id="signin">Sign in with Google</button>
    <div class="who" id="who"></div>
  </div>
  <div class="board" id="board"></div>
  <div id="sentinel"></div>
  <div id="more"></div>
</div>

<script type="module">
import { getFirebase, listPage, getUrl, deleteRun, archiveRun } from './leaderboard.js';
import { GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';

const ADMIN_EMAIL = 'YOUR_ADMIN_EMAIL@example.com';
const USE_EMULATOR = new URLSearchParams(location.search).has('emu');
const $ = id => document.getElementById(id);

const { auth } = await getFirebase(USE_EMULATOR);   // (also signs in anon; Google overrides it)
let loaded = false;

$('signin').onclick = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e => {
  $('who').textContent = 'sign-in failed: ' + (e.code || e.message);
  $('gate').classList.add('err');
});

onAuthStateChanged(auth, user => {
  const isAdmin = user && user.email === ADMIN_EMAIL && user.emailVerified;
  if (isAdmin) {
    $('signin').style.display = 'none';
    $('gate').classList.remove('err');
    $('who').innerHTML = `signed in as <b>${user.email}</b> — <a id="out">sign out</a>`;
    $('out').onclick = () => signOut(auth).then(() => location.reload());
    if (!loaded) { loaded = true; loadAll(); }
  } else if (user && user.email) {
    $('gate').classList.add('err');
    $('who').innerHTML = `signed in as ${user.email} — not an admin. <a id="out">sign out</a>`;
    $('out').onclick = () => signOut(auth).then(() => location.reload());
  } else {
    $('who').textContent = 'admins only — moderate clips reported as inappropriate.';
  }
});

// ---- list every run with a delete button ----
const board = $('board'), moreEl = $('more');
let token = null, loading = false, done = false, n = 0;

function card(r) {
  n++;
  const el = document.createElement('div');
  el.className = 'run';
  el.innerHTML = `
    <video preload="none" playsinline loop muted controls></video>
    <div class="hover-hint">hover to play ▸</div>
    <div class="meta"><span class="pts">${r.score}<small> pts</small></span>
      <span class="stats">#${n} · ${r.sliced} sliced<br>combo x${r.combo}</span></div>
    <div class="modrow"><button class="mod archive">📥 archive</button><button class="mod kill">🗑 delete</button></div>`;
  const vid = el.querySelector('video');
  const hint = el.querySelector('.hover-hint');
  let urlP = null;
  const ensure = () => (urlP ||= getUrl(r.item).then(u => { vid.src = u; return u; }).catch(() => { urlP = null; }));
  el.addEventListener('mouseenter', async () => { await ensure(); vid.play().catch(()=>{}); hint.style.display='none'; });
  el.addEventListener('mouseleave', () => vid.pause());
  // two-click confirm on each action
  const wire = (btn, label, run) => {
    let armed = 0;
    btn.onclick = async () => {
      if (Date.now() - armed > 3000) { armed = Date.now(); btn.textContent = 'SURE?'; setTimeout(()=>{btn.isConnected&&(btn.textContent=label);},3000); return; }
      try { btn.textContent = '…'; el.querySelectorAll('.mod').forEach(b=>b.disabled=true); await run(); el.remove(); }
      catch (e) { btn.disabled = false; btn.textContent = 'failed: ' + (e.code || e.message); }
    };
  };
  wire(el.querySelector('.archive'), '📥 archive', () => archiveRun(r.item));
  wire(el.querySelector('.kill'), '🗑 delete', () => deleteRun(r.item));
  board.appendChild(el);
}

async function loadPage() {
  if (loading || done) return;
  loading = true; moreEl.textContent = 'loading…';
  try {
    const { runs, nextPageToken } = await listPage(USE_EMULATOR, { pageToken: token, pageSize: 24 });
    runs.forEach(card);
    token = nextPageToken;
    if (n === 0) { moreEl.textContent = 'no clips on the wall.'; done = true; }
    else if (!token) { moreEl.textContent = `— ${n} clips total —`; done = true; }
    else moreEl.textContent = '';
  } catch (e) { moreEl.textContent = 'error: ' + (e.code || e.message); done = true; }
  finally { loading = false; }
}

let visible = false, pumping = false;
async function pump() { if (pumping) return; pumping = true; while (visible && !loading && !done) await loadPage(); pumping = false; }
new IntersectionObserver(es => { visible = es[0].isIntersecting; if (visible) pump(); }, { rootMargin: '500px' }).observe($('sentinel'));

async function loadAll() { await loadPage(); pump(); }
</script>
</body>
</html>
